<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한화손보</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        <header class="header">
            <div class="header-left">
                    <img src="assets/svg/hanwha-logo.svg" alt="한화손보 로고" width="96" height="32">
            </div>
            <div class="header-right">
                <button class="icon-btn">
                    <img src="assets/svg/bell-icon.svg" alt="알림" width="24" height="24">
                </button>
                <button class="icon-btn">
                    <img src="assets/svg/menu-icon.svg" alt="메뉴" width="24" height="24">
                </button>
            </div>
        </header>

        <main class="main-content">
            <div class="feature-cards-grid">
                <div class="feature-card">
                    <h3 class="feature-card-title">고객 등록</h3>
                    <p class="feature-card-subtitle">신규 고객 추가</p>
                     <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42" fill="none">
                        <path d="M4.2002 9.24C4.2002 6.45648 6.7074 4.2 9.8002 4.2H32.2002C35.293 4.2 37.8002 6.45648 37.8002 9.24V32.76C37.8002 35.5435 35.293 37.8 32.2002 37.8H9.8002C6.7074 37.8 4.2002 35.5435 4.2002 32.76V9.24Z" fill="#FFBB00"/>
                        <path d="M28.0728 27.776C29.0083 27.1151 29.1592 25.8018 28.3497 24.9915C27.1179 23.7587 25.433 23 23.5788 23H18.4212C16.5661 23 14.8804 23.7595 13.6485 24.9933C12.8402 25.803 12.99 27.1149 13.9239 27.7758C15.8942 29.1703 18.6205 30 21 30C23.3781 30 26.1027 29.1679 28.0728 27.776Z" fill="white"/>
                        <path d="M25.5 16.5C25.5 18.9853 23.4853 21 21 21C18.5147 21 16.5 18.9853 16.5 16.5C16.5 14.0147 18.5147 12 21 12C23.4853 12 25.5 14.0147 25.5 16.5Z" fill="white"/>
                    </svg>
                </div>
                
                <div class="feature-card">
                    <h3 class="feature-card-title">고객/계약 조회</h3>
                    <p class="feature-card-subtitle">나의 고객 조회</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42" fill="none">
                        <path d="M4.7251 9.45H37.2751V33.5475C37.2751 35.8961 35.2879 37.8 32.8365 37.8H9.16373C6.71234 37.8 4.7251 35.8961 4.7251 33.5475V9.45Z" fill="#B1A1F5"/>
                        <path d="M4.7251 6.825C4.7251 5.37525 6.04993 4.2 7.68419 4.2H34.316C35.9503 4.2 37.2751 5.37525 37.2751 6.825V9.45H4.7251V6.825Z" fill="#9986E8"/>
                        <path d="M20.2695 14C24.0079 14.0001 27.0381 17.031 27.0381 20.7695C27.038 22.194 26.5972 23.515 25.8457 24.6055L29.1396 27.8994C29.6202 28.38 29.6201 29.1589 29.1396 29.6396C28.659 30.1203 27.8801 30.1203 27.3994 29.6396L24.1045 26.3457C23.0142 27.097 21.6937 27.5381 20.2695 27.5381C16.5312 27.5381 13.5002 24.5079 13.5 20.7695C13.5 17.031 16.5311 14 20.2695 14ZM20.2695 16.4619C17.8906 16.4619 15.9619 18.3905 15.9619 20.7695C15.9621 23.1484 17.8907 25.0771 20.2695 25.0771C22.6483 25.0771 24.577 23.1484 24.5771 20.7695C24.5771 18.3905 22.6485 16.462 20.2695 16.4619Z" fill="white"/>
                    </svg>
                </div>
                
                <div class="feature-card">
                    <h3 class="feature-card-title">+고객</h3>
                    <p class="feature-card-subtitle">고객 관리</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42" fill="none">
                        <path d="M4.2002 9.24C4.2002 6.45649 6.45668 4.2 9.2402 4.2H32.7602C35.5437 4.2 37.8002 6.45649 37.8002 9.24V32.76C37.8002 35.5435 35.5437 37.8 32.7602 37.8H9.24019C6.45668 37.8 4.2002 35.5435 4.2002 32.76V9.24Z" fill="#00AC82"/>
                        <path d="M21.5732 13.5C21.9873 13.5 22.3231 13.8359 22.3232 14.25V19.6768H27.75C28.1641 19.6769 28.5 20.0126 28.5 20.4268V21.5732C28.5 21.9874 28.1641 22.3231 27.75 22.3232H22.3232V27.75C22.3231 28.164 21.9873 28.5 21.5732 28.5H20.4268C20.0127 28.5 19.6769 28.164 19.6768 27.75V22.3232H14.25C13.836 22.323 13.5 21.9873 13.5 21.5732V20.4268C13.5 20.0127 13.836 19.677 14.25 19.6768H19.6768V14.25C19.6769 13.8359 20.0127 13.5 20.4268 13.5H21.5732Z" fill="white"/>
                    </svg>  
                </div>
                
                <div class="feature-card">
                    <h3 class="feature-card-title">보장 분석</h3>
                    <p class="feature-card-subtitle">맞춤 분석</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 42 42" fill="none">
                        <path d="M4.2002 9.24C4.2002 6.45649 6.45668 4.2 9.2402 4.2H32.7602C35.5437 4.2 37.8002 6.45649 37.8002 9.24V32.76C37.8002 35.5435 35.5437 37.8 32.7602 37.8H9.24019C6.45668 37.8 4.2002 35.5435 4.2002 32.76V9.24Z" fill="#67A0FF"/>
                        <path d="M30.5002 21.8391C30.5002 22.2623 30.1572 22.6053 29.7341 22.6053H28.6382C28.2151 22.6053 27.8721 22.2623 27.8721 21.8391V19.4485L20.509 26.2885C20.215 26.5616 19.7601 26.5616 19.4662 26.2885L16.0454 23.1107L11.8127 27.1209C11.5068 27.4107 11.0242 27.3991 10.7327 27.0949L9.97282 26.3022C9.67568 25.9922 9.6913 25.4985 10.0075 25.2079L15.5241 20.1374C15.8184 19.8669 16.2712 19.8681 16.564 20.1402L19.9876 23.3205L26.0139 17.7223H23.3819C22.9588 17.7223 22.6157 17.3793 22.6157 16.9562V16.047C22.6157 15.6239 22.9588 15.2809 23.3819 15.2809H29.7341C30.1572 15.2809 30.5002 15.6239 30.5002 16.047V21.8391Z" fill="white"/>
                    </svg>
                </div>
                
                <div class="feature-card">
                    <h3 class="feature-card-title no-img">학습 홈</h3>
                    <p class="feature-card-subtitle">온라인 교육</p>
                </div>
                
                <div class="feature-card">
                    <h3 class="feature-card-title no-img">가입설계 홈</h3>
                    <p class="feature-card-subtitle">영업 지원</p>
                </div>
            </div>

            <button class="menu-view-btn">메뉴 전체 보기</button>

            <section class="activity-hero-card" aria-label="활동 요약">
                <h2 class="activity-hero-title">김한화 님의 활동</h2>

                <p class="activity-hero-amount">
                    2,600,000<span class="activity-hero-unit">원</span>
                </p>

                <div class="activity-hero-grade">
                    <span>장기표준등급</span>
                    <img src="assets/svg/info-icon.svg" alt="등급 정보" width="19" height="19">
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" style="--progress: 88%"></div>
                </div>

                <p class="activity-hero-date">2026.03.06 기준</p>

                <div class="activity-hero-metrics">
                    <div class="activity-hero-metric-card">
                        <p class="activity-hero-metric-title">모니터링</p>
                        <p class="activity-hero-metric-value">진행중 <strong>2건</strong></p>
                    </div>

                    <div class="activity-hero-metric-card">
                        <p class="activity-hero-metric-title">신계약</p>
                        <p class="activity-hero-metric-value">이번달 <strong>1건</strong> <span class="metric-new-badge">N</span></p>
                    </div>
                </div>
            </section>
        </main>

        <div class="search-container">
            <input id="search-input" type="text" class="search-input" placeholder="조회할 고객명을 입력하세요.">
            <button class="search-btn">
                <img src="assets/svg/search-icon.svg" alt="검색" width="24" height="24">
            </button>
        </div>
    </div>
</body>
</html>
